<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kasrlar Kalkulyatori</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;min-height:100vh;display:flex;flex-direction:column}
  header{background:linear-gradient(135deg,#1E40AF,#6D28D9);padding:14px 16px;display:flex;align-items:center;gap:10px}
  header h1{font-size:1rem;font-weight:700;color:#fff}
  .container{flex:1;padding:16px;max-width:480px;margin:0 auto;width:100%}
  .card{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:12px}
  label{font-size:.75rem;font-weight:600;color:#94A3B8;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .fraction-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  input{background:#0F172A;border:1.5px solid #334155;border-radius:8px;color:#E2E8F0;padding:9px 12px;font-size:1rem;width:70px;text-align:center;outline:none}
  input:focus{border-color:#6366F1}
  .frac-box{display:flex;flex-direction:column;align-items:center;gap:4px}
  .frac-line{width:50px;height:2px;background:#475569;border-radius:1px}
  select{background:#0F172A;border:1.5px solid #334155;border-radius:8px;color:#E2E8F0;padding:9px 12px;font-size:1.1rem;outline:none}
  .btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:4px}
  .result{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1));border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:16px;text-align:center;display:none}
  .result.show{display:block}
  .res-main{font-size:1.8rem;font-weight:800;color:#A78BFA}
  .res-mixed{font-size:.9rem;color:#94A3B8;margin-top:6px}
  .res-decimal{font-size:.85rem;color:#64748B;margin-top:4px}
  .steps{background:#0F172A;border-radius:10px;padding:12px;margin-top:10px;font-size:.8rem;color:#94A3B8;line-height:1.8;text-align:left}
  .err{color:#F87171;font-size:.82rem;text-align:center;margin-top:8px;display:none}
  .err.show{display:block}
</style>
</head>
<body>
<header>
  <span style="font-size:1.4rem">➗</span>
  <h1>Kasrlar Kalkulyatori</h1>
</header>
<div class="container">
  <div class="card">
    <label>Birinchi kasr</label>
    <div class="fraction-row">
      <div class="frac-box">
        <input type="number" id="a1" placeholder="1" min="-999" max="999">
        <div class="frac-line"></div>
        <input type="number" id="b1" placeholder="2" min="1" max="999">
      </div>
      <select id="op">
        <option value="+">➕</option>
        <option value="-">➖</option>
        <option value="*">✖️</option>
        <option value="/">➗</option>
      </select>
      <div class="frac-box">
        <input type="number" id="a2" placeholder="1" min="-999" max="999">
        <div class="frac-line"></div>
        <input type="number" id="b2" placeholder="3" min="1" max="999">
      </div>
    </div>
    <button class="btn" onclick="calculate()">= Hisoblash</button>
    <div class="err" id="err">❌ Maxraj 0 bo'lmasin!</div>
  </div>
  <div class="result" id="result">
    <div style="font-size:.75rem;color:#64748B;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Natija</div>
    <div class="res-main" id="res-frac"></div>
    <div class="res-mixed" id="res-mixed"></div>
    <div class="res-decimal" id="res-decimal"></div>
    <div class="steps" id="steps"></div>
  </div>
</div>
<script>
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){let t=b;b=a%b;a=t;}return a;}
function calculate(){
  const a1=parseInt(document.getElementById('a1').value)||0;
  const b1=parseInt(document.getElementById('b1').value)||0;
  const a2=parseInt(document.getElementById('a2').value)||0;
  const b2=parseInt(document.getElementById('b2').value)||0;
  const op=document.getElementById('op').value;
  const err=document.getElementById('err');
  const res=document.getElementById('result');
  err.classList.remove('show');
  if(b1===0||b2===0||(op==='/'&&a2===0)){err.classList.add('show');res.classList.remove('show');return;}
  let numRes,denRes,steps='';
  if(op==='+'){
    numRes=a1*b2+a2*b1; denRes=b1*b2;
    steps=`${a1}/${b1} + ${a2}/${b2} = (${a1}×${b2} + ${a2}×${b1}) / (${b1}×${b2}) = ${numRes}/${denRes}`;
  } else if(op==='-'){
    numRes=a1*b2-a2*b1; denRes=b1*b2;
    steps=`${a1}/${b1} − ${a2}/${b2} = (${a1}×${b2} − ${a2}×${b1}) / (${b1}×${b2}) = ${numRes}/${denRes}`;
  } else if(op==='*'){
    numRes=a1*a2; denRes=b1*b2;
    steps=`${a1}/${b1} × ${a2}/${b2} = (${a1}×${a2}) / (${b1}×${b2}) = ${numRes}/${denRes}`;
  } else {
    numRes=a1*b2; denRes=b1*a2;
    steps=`${a1}/${b1} ÷ ${a2}/${b2} = ${a1}/${b1} × ${b2}/${a2} = ${numRes}/${denRes}`;
  }
  const sign=numRes<0?-1:1;
  const g=gcd(Math.abs(numRes),Math.abs(denRes));
  const sNum=(numRes/g); const sDen=(denRes/g);
  const finalNum=sign*Math.abs(sNum); const finalDen=Math.abs(sDen);
  document.getElementById('res-frac').textContent=finalDen===1?finalNum:`${finalNum} / ${finalDen}`;
  const whole=Math.trunc(finalNum/finalDen);
  const rem=Math.abs(finalNum%finalDen);
  document.getElementById('res-mixed').textContent=
    (Math.abs(whole)>0&&rem>0)?`Aralash son: ${whole} va ${rem}/${finalDen}`:'';
  document.getElementById('res-decimal').textContent=`O'nli kasr: ${(finalNum/finalDen).toFixed(4)}`;
  if(g>1) steps+=`\nQisqartirish (EKUB=${g}): ${numRes/g} / ${denRes/g}`;
  document.getElementById('steps').textContent=steps;
  res.classList.add('show');
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')calculate();});
</script>
</body>
</html>
