<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍕 Kasrlar Kalkulyatori | Jaloliddin09</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --crust: #c8860a;
    --cheese: #f5c842;
    --sauce: #e8431a;
    --shadow-slice: rgba(80,30,0,0.18);
    --bg1: #1a0a00;
    --bg2: #2d1200;
    --accent: #ff6b1a;
    --gold: #ffd700;
    --white: #fff8f0;
    --green: #4caf50;
    --blue: #2196f3;
    --card: rgba(255,255,255,0.07);
    --border: rgba(255,200,100,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(ellipse at 20% 20%, #3d1800 0%, #1a0a00 40%, #0d0500 100%);
    min-height: 100vh;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Floating pizza emojis background */
  .bg-emojis {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-emoji {
    position: absolute; font-size: 2rem; opacity: 0.06;
    animation: floatEmoji linear infinite;
  }

  @keyframes floatEmoji {
    from { transform: translateY(110vh) rotate(0deg); }
    to   { transform: translateY(-10vh) rotate(360deg); }
  }

  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 2rem 1rem 0.5rem;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,200,0,0.5), 2px 4px 0 #7a3d00;
    letter-spacing: 1px;
  }
  header p {
    color: #ffb366; font-size: 1rem; margin-top: 4px; font-weight: 700;
  }
  .author {
    display: inline-block; margin-top: 6px;
    background: linear-gradient(135deg, #ff6b1a, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-size: 0.85rem; font-weight: 900; letter-spacing: 2px;
  }

  .main-wrap {
    position: relative; z-index: 10;
    max-width: 1100px; margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    align-items: start;
  }

  @media(max-width:700px){
    .main-wrap { grid-template-columns: 1fr; }
    .operator-col { order: 3; }
    .result-section { order: 4; grid-column: 1; }
  }

  /* FRACTION INPUT CARD */
  .fraction-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 1.5rem 1rem 1.2rem;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    transition: transform 0.3s;
  }
  .fraction-card:hover { transform: translateY(-4px); }

  .card-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; color: var(--gold); letter-spacing: 1px;
  }

  /* PIZZA SVG */
  .pizza-wrap {
    position: relative;
    width: 200px; height: 200px;
  }
  .pizza-svg { width: 100%; height: 100%; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5)); }

  /* INPUT ROW */
  .input-row {
    display: flex; align-items: center; gap: 0.5rem;
  }
  .frac-input {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,200,100,0.3);
    border-radius: 12px;
    color: var(--white);
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    width: 64px; height: 64px;
    text-align: center;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
    -moz-appearance: textfield;
  }
  .frac-input::-webkit-inner-spin-button,
  .frac-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .frac-input:focus {
    border-color: var(--gold);
    background: rgba(255,200,0,0.12);
  }
  .divider-line {
    width: 60px; height: 4px;
    background: linear-gradient(90deg, #ff6b1a, #ffd700);
    border-radius: 4px;
    margin: 2px 0;
  }
  .frac-stack { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  /* fraction display text */
  .frac-display {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem; color: var(--gold);
    min-height: 2rem;
  }

  /* OPERATOR COLUMN */
  .operator-col {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem; padding-top: 3rem;
  }
  .op-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid transparent;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(255,255,255,0.07);
    color: var(--white);
  }
  .op-btn:hover { transform: scale(1.1); }
  .op-btn.active-plus {
    background: linear-gradient(135deg, #4caf50, #81c784);
    border-color: #fff;
    box-shadow: 0 0 20px rgba(76,175,80,0.5);
    color: #fff;
  }
  .op-btn.active-minus {
    background: linear-gradient(135deg, #e53935, #ef9a9a);
    border-color: #fff;
    box-shadow: 0 0 20px rgba(229,57,53,0.5);
    color: #fff;
  }
  .equals-sign {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem; color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
  }

  /* RESULT SECTION */
  .result-section {
    grid-column: 1 / -1;
    display: flex; flex-direction: column; align-items: center;
    gap: 1.2rem; padding-top: 0.5rem;
  }

  .result-card {
    background: linear-gradient(135deg, rgba(255,107,26,0.15), rgba(255,215,0,0.1));
    border: 2px solid rgba(255,215,0,0.3);
    border-radius: 28px;
    padding: 1.5rem 3rem;
    text-align: center;
    min-width: 260px;
    box-shadow: 0 0 40px rgba(255,150,0,0.15);
    backdrop-filter: blur(10px);
  }
  .result-label {
    font-size: 0.9rem; color: #ffb366; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 0.5rem;
  }
  .result-value {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,200,0,0.4), 2px 3px 0 #7a3d00;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    display: inline-block;
  }
  .result-value.pop {
    animation: popAnim 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popAnim {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* WHOLE PIZZAS DISPLAY */
  .whole-pizzas {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem;
    padding: 0.5rem;
  }
  .whole-pizza-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0) rotate(-15deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .whole-pizza-item svg { filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5)); }
  .whole-pizza-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; color: var(--gold);
    text-shadow: 1px 2px 0 #7a3d00;
  }

  .remainder-label {
    font-size: 0.9rem; color: #ffb366; font-weight: 700; text-align: center;
  }

  /* STEP EXPLANATION */
  .step-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,200,100,0.15);
    border-radius: 16px;
    padding: 1rem 1.5rem;
    font-size: 1rem;
    color: #ffd9a0;
    text-align: center;
    line-height: 1.7;
    max-width: 500px;
  }
  .step-box span { color: var(--gold); font-weight: 900; }

  /* Slice animation */
  .pizza-slice-path {
    transition: opacity 0.3s, transform 0.3s;
    transform-origin: center;
  }

  .error-msg {
    color: #ff6b6b; font-size: 0.9rem; font-weight: 700; min-height: 1.2rem;
  }

  footer {
    position: relative; z-index: 10;
    text-align: center; padding: 1rem;
    color: rgba(255,180,80,0.4); font-size: 0.8rem;
  }
</style>
</head>
<body>

<!-- Background floating pizzas -->
<div class="bg-emojis" id="bgEmojis"></div>

<header>
  <h1>🍕 Kasrlar Kalkulyatori</h1>
  <p>Pizza orqali kasrlarni qo'sh yoki ayir!</p>
  <div class="author">✦ JALOLIDDIN09 ✦</div>
</header>

<div class="main-wrap">

  <!-- FRACTION 1 -->
  <div class="fraction-card" id="card1">
    <div class="card-label">🍕 Birinchi Kasr</div>
    <div class="pizza-wrap">
      <svg class="pizza-svg" id="pizza1" viewBox="0 0 200 200"></svg>
    </div>
    <div class="frac-display" id="display1">—</div>
    <div class="input-row">
      <div class="frac-stack">
        <input class="frac-input" id="num1" type="number" min="0" max="99" placeholder="5" value="">
        <div class="divider-line"></div>
        <input class="frac-input" id="den1" type="number" min="1" max="20" placeholder="8" value="">
      </div>
    </div>
    <div class="error-msg" id="err1"></div>
  </div>

  <!-- OPERATOR -->
  <div class="operator-col">
    <button class="op-btn active-plus" id="btnPlus" onclick="setOp('+')">+</button>
    <button class="op-btn" id="btnMinus" onclick="setOp('-')">−</button>
    <div class="equals-sign">=</div>
  </div>

  <!-- FRACTION 2 -->
  <div class="fraction-card" id="card2">
    <div class="card-label">🍕 Ikkinchi Kasr</div>
    <div class="pizza-wrap">
      <svg class="pizza-svg" id="pizza2" viewBox="0 0 200 200"></svg>
    </div>
    <div class="frac-display" id="display2">—</div>
    <div class="input-row">
      <div class="frac-stack">
        <input class="frac-input" id="num2" type="number" min="0" max="99" placeholder="3" value="">
        <div class="divider-line"></div>
        <input class="frac-input" id="den2" type="number" min="1" max="20" placeholder="8" value="">
      </div>
    </div>
    <div class="error-msg" id="err2"></div>
  </div>

  <!-- RESULT -->
  <div class="result-section" id="resultSection" style="display:none">
    <div class="result-card">
      <div class="result-label">📊 Natija</div>
      <div class="result-value" id="resultValue">—</div>
    </div>
    <div class="whole-pizzas" id="wholePizzas"></div>
    <div class="step-box" id="stepBox"></div>
  </div>

</div>

<footer>© 2025 Jaloliddin09 | Kasrlar Dunyosi 🍕</footer>

<script>
// ── BG EMOJIS ──
const bgWrap = document.getElementById('bgEmojis');
for(let i=0;i<18;i++){
  const e = document.createElement('span');
  e.className = 'bg-emoji';
  e.textContent = ['🍕','🍕','🍕','🧮','✏️','🎓'][Math.floor(Math.random()*6)];
  e.style.left = Math.random()*100+'%';
  e.style.fontSize = (1.2+Math.random()*2.5)+'rem';
  e.style.animationDuration = (12+Math.random()*20)+'s';
  e.style.animationDelay = (-Math.random()*20)+'s';
  bgWrap.appendChild(e);
}

// ── STATE ──
let operator = '+';

function setOp(op){
  operator = op;
  document.getElementById('btnPlus').className = 'op-btn' + (op==='+' ? ' active-plus' : '');
  document.getElementById('btnMinus').className = 'op-btn' + (op==='-' ? ' active-minus' : '');
  calculate();
}

// ── PIZZA DRAW ──
function drawPizza(svgEl, numerator, denominator, animated=false){
  svgEl.innerHTML = '';
  const cx=100, cy=100, r=90, ri=14;
  if(!denominator || denominator<1){ return; }

  // Background circle (crust)
  const bgCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  bgCircle.setAttribute('cx',cx); bgCircle.setAttribute('cy',cy);
  bgCircle.setAttribute('r',r);
  bgCircle.setAttribute('fill','#c8860a');
  svgEl.appendChild(bgCircle);

  const slices = denominator;
  const angleStep = (2*Math.PI)/slices;

  for(let i=0;i<slices;i++){
    const a1 = -Math.PI/2 + i*angleStep;
    const a2 = a1 + angleStep;
    const filled = i < numerator;

    // Slice path
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const xi1=cx+ri*Math.cos(a1), yi1=cy+ri*Math.sin(a1);
    const xi2=cx+ri*Math.cos(a2), yi2=cy+ri*Math.sin(a2);

    const d = `M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 0 0 ${xi1} ${yi1} Z`;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);

    if(filled){
      // Cheese color
      path.setAttribute('fill','#f5c842');
    } else {
      // Empty / shadow
      path.setAttribute('fill','rgba(20,5,0,0.72)');
    }

    // Slice border
    path.setAttribute('stroke','#7a3d00');
    path.setAttribute('stroke-width','2.5');
    path.style.transition = 'fill 0.4s';

    if(animated){
      path.style.opacity = '0';
      path.style.transition = `opacity 0.3s ${i*0.06}s, fill 0.4s`;
      setTimeout(()=>{ path.style.opacity='1'; }, 50);
    }

    svgEl.appendChild(path);

    // Toppings (pepperoni) on filled slices
    if(filled && slices <= 12){
      const mid = a1 + angleStep/2;
      const tr = r*0.58;
      const tx = cx + tr*Math.cos(mid);
      const ty = cy + tr*Math.sin(mid);
      const pepperoni = document.createElementNS('http://www.w3.org/2000/svg','circle');
      pepperoni.setAttribute('cx', tx); pepperoni.setAttribute('cy', ty);
      pepperoni.setAttribute('r', Math.max(5, 11-slices*0.4));
      pepperoni.setAttribute('fill','#c0392b');
      pepperoni.setAttribute('opacity','0.85');
      svgEl.appendChild(pepperoni);
    }
  }

  // Center hole
  const center = document.createElementNS('http://www.w3.org/2000/svg','circle');
  center.setAttribute('cx',cx); center.setAttribute('cy',cy);
  center.setAttribute('r',ri);
  center.setAttribute('fill','#7a3d00');
  center.setAttribute('stroke','#5a2d00');
  center.setAttribute('stroke-width','2');
  svgEl.appendChild(center);

  // Fraction text in center
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x',cx); txt.setAttribute('y',cy+5);
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('font-family','Fredoka One, cursive');
  txt.setAttribute('font-size','10');
  txt.setAttribute('fill','#ffd700');
  txt.textContent = numerator+'/'+denominator;
  svgEl.appendChild(txt);
}

// ── WHOLE PIZZA DRAW (small) ──
function makeWholePizzaSVG(size=90){
  const ns='http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 200 200');
  svg.setAttribute('width', size); svg.setAttribute('height', size);

  const cx=100,cy=100,r=90,ri=14;
  const slices=8, angleStep=(2*Math.PI)/slices;

  const bg=document.createElementNS(ns,'circle');
  bg.setAttribute('cx',cx);bg.setAttribute('cy',cy);bg.setAttribute('r',r);
  bg.setAttribute('fill','#c8860a'); svg.appendChild(bg);

  for(let i=0;i<slices;i++){
    const a1=-Math.PI/2+i*angleStep, a2=a1+angleStep;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ri*Math.cos(a1),yi1=cy+ri*Math.sin(a1);
    const xi2=cx+ri*Math.cos(a2),yi2=cy+ri*Math.sin(a2);
    const d=`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 0 0 ${xi1} ${yi1} Z`;
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',d);
    path.setAttribute('fill','#f5c842');
    path.setAttribute('stroke','#7a3d00');
    path.setAttribute('stroke-width','2.5');
    svg.appendChild(path);

    const mid=a1+angleStep/2;
    const tr=r*0.58;
    const tx=cx+tr*Math.cos(mid),ty=cy+tr*Math.sin(mid);
    const p=document.createElementNS(ns,'circle');
    p.setAttribute('cx',tx);p.setAttribute('cy',ty);
    p.setAttribute('r','8');p.setAttribute('fill','#c0392b');p.setAttribute('opacity','0.85');
    svg.appendChild(p);
  }

  const cent=document.createElementNS(ns,'circle');
  cent.setAttribute('cx',cx);cent.setAttribute('cy',cy);cent.setAttribute('r',ri);
  cent.setAttribute('fill','#7a3d00');cent.setAttribute('stroke','#5a2d00');cent.setAttribute('stroke-width','2');
  svg.appendChild(cent);
  return svg;
}

// ── CALCULATE ──
function gcd(a,b){ return b===0?a:gcd(b,a%b); }

function calculate(){
  const n1=parseInt(document.getElementById('num1').value);
  const d1=parseInt(document.getElementById('den1').value);
  const n2=parseInt(document.getElementById('num2').value);
  const d2=parseInt(document.getElementById('den2').value);

  const err1=document.getElementById('err1');
  const err2=document.getElementById('err2');
  err1.textContent=''; err2.textContent='';

  // Draw individual pizzas if valid
  if(!isNaN(n1) && !isNaN(d1) && d1>=1 && d1<=20 && n1>=0){
    drawPizza(document.getElementById('pizza1'), n1, d1, true);
    document.getElementById('display1').textContent = n1+' / '+d1;
  } else {
    document.getElementById('pizza1').innerHTML='';
    document.getElementById('display1').textContent='—';
    if(!isNaN(d1) && (d1<1||d1>20)) err1.textContent='Maxraj 1-20 oralig\'ida bo\'lsin!';
  }

  if(!isNaN(n2) && !isNaN(d2) && d2>=1 && d2<=20 && n2>=0){
    drawPizza(document.getElementById('pizza2'), n2, d2, true);
    document.getElementById('display2').textContent = n2+' / '+d2;
  } else {
    document.getElementById('pizza2').innerHTML='';
    document.getElementById('display2').textContent='—';
    if(!isNaN(d2) && (d2<1||d2>20)) err2.textContent='Maxraj 1-20 oralig\'ida bo\'lsin!';
  }

  // Full calculation
  if(isNaN(n1)||isNaN(d1)||isNaN(n2)||isNaN(d2)||d1<1||d2<1){
    document.getElementById('resultSection').style.display='none';
    return;
  }

  let resN, resD;
  if(operator==='+'){
    resN = n1*d2 + n2*d1;
    resD = d1*d2;
  } else {
    resN = n1*d2 - n2*d1;
    resD = d1*d2;
  }

  // Simplify
  const g = gcd(Math.abs(resN), resD);
  const simpN = resN/g;
  const simpD = resD/g;

  // Whole numbers
  const wholes = Math.floor(Math.abs(simpN)/simpD) * Math.sign(simpN);
  const remN   = Math.abs(simpN) % simpD;

  // Display result
  let resultText = '';
  if(simpN<0 && simpD>0) resultText += '−';
  if(remN===0){
    resultText += Math.abs(wholes);
  } else if(wholes!==0){
    resultText += Math.abs(wholes) + ' ' + remN+'/'+simpD;
  } else {
    resultText += Math.abs(simpN)+'/'+simpD;
  }

  const rv = document.getElementById('resultValue');
  rv.textContent = resultText;
  rv.classList.remove('pop');
  void rv.offsetWidth;
  rv.classList.add('pop');

  // Whole pizzas display
  const wholePizzas = document.getElementById('wholePizzas');
  wholePizzas.innerHTML='';
  if(Math.abs(wholes)>0 && Math.abs(wholes)<=8){
    // show individual pizza svgs
    for(let i=0;i<Math.abs(wholes);i++){
      const item = document.createElement('div');
      item.className='whole-pizza-item';
      item.style.animationDelay = (i*0.12)+'s';
      const svg = makeWholePizzaSVG(Math.abs(wholes)<=4?100:70);
      item.appendChild(svg);
      if(i===0){
        const lbl=document.createElement('div');
        lbl.className='whole-pizza-label';
        lbl.textContent=Math.abs(wholes)>1?Math.abs(wholes)+'✕':'1 ta';
        item.appendChild(lbl);
      }
      wholePizzas.appendChild(item);
      if(Math.abs(wholes)>4 && i===0) break; // show 1 with multiplier
    }
  }
  if(Math.abs(wholes)>8){
    const item=document.createElement('div');
    item.className='whole-pizza-item';
    const svg=makeWholePizzaSVG(100);
    item.appendChild(svg);
    const lbl=document.createElement('div');
    lbl.className='whole-pizza-label';
    lbl.textContent=Math.abs(wholes)+'✕';
    item.appendChild(lbl);
    wholePizzas.appendChild(item);
  }

  // Step explanation
  let step = '';
  if(d1===d2){
    step = `Maxrajlar teng (${d1}), shuning uchun:\n<span>${n1} ${operator} ${n2} = ${simpN<0?simpN:Math.abs(simpN)}</span>, maxraj: <span>${simpD}</span>`;
  } else {
    step = `Maxrajlar har xil, umumiy maxraj: <span>${d1}×${d2} = ${d1*d2}</span>\n→ <span>${n1}×${d2} ${operator} ${n2}×${d1} = ${resN}</span> / <span>${d1*d2}</span>\n→ Soddalashtirish: <span>${simpN}/${simpD}</span>`;
  }
  document.getElementById('stepBox').innerHTML = step.replace(/\n/g,'<br>');

  document.getElementById('resultSection').style.display='flex';
}

// ── INPUT LISTENERS ──
['num1','den1','num2','den2'].forEach(id=>{
  document.getElementById(id).addEventListener('input', calculate);
});

// Initial demo
window.addEventListener('load', ()=>{
  document.getElementById('num1').value=5;
  document.getElementById('den1').value=8;
  document.getElementById('num2').value=3;
  document.getElementById('den2').value=8;
  setTimeout(calculate, 300);
});
</script>
